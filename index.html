<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Library</title>
    <script src="./javascript.js" defer></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <h1>My Library!</h1>
    <p>Please note these books may or may not yet be read; I keep them in my personal library, with several on a "to-read" list!</p>
    <button command="show-modal" commandfor="my-dialog">Add New Book</button>

    <dialog id="my-dialog" closedby="any">
        <p>Add a book below:</p>
        <form action="" method="dialog">
            <label for="book_title">Book Title</label>
            <input type="text" id="book_title" name="book_title">

            <label for="author_name" method="get">Author</label>
            <input type="text" id="author_name" name="author_name">

            <label for="number_pages" method="get">Number of Pages</label>
            <input type="number" name="number_pages" id="number_pages" min="0" value="0">

            <div><label for="read_status" method="get">Have you read this book?</label>
            <input type="checkbox" name="read_status" id="read_status"></div>
            
            <button type="submit">Submit</button>
        </form>
    </dialog>
    <div class="card-container">
    </div>
</body>
</html>
